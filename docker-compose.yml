services:
  postgres:
    image: postgres:18-alpine
    container_name: valisgo-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: valisgo
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U user -d valisgo'"]
      interval: 5s
      timeout: 3s
      retries: 10

  valisgo:
    build: .
    container_name: valisgo-server
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER: postgres
      DB_DSN: postgres://user:pass@postgres:5432/valisgo?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
