services:
  postgres:
    image: postgres:18-alpine
    container_name: valisgo-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: valisgo
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U user -d valisgo'"]
      interval: 5s
      timeout: 3s
      retries: 10

  valisgo:
    build: .
    container_name: valisgo-server
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER: postgres
      DB_DSN: postgres://user:pass@postgres:5432/valisgo?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      dex:
        condition: service_started

  dex:
    image: dexidp/dex
    container_name: dex
    restart: on-failure
    ports:
      - "5556:5556"
    configs:
      - source: dex_config
        target: /etc/dex/config.docker.yaml


configs:
  dex_config:
    content: |
      # Use internal service name as issuer - this must match the provider_url
      issuer: http://dex:5556/dex

      # Also provide a public issuer endpoint for browsers
      issuerRotation:
        # Keep old issuer id for existing token validation
        - issuer: http://localhost:5556/dex

      storage:
        type: memory

      web:
        http: 0.0.0.0:5556
        allowedOrigins: ['*']

      staticClients:
        - id: valisgo-cli
          redirectURIs:
            - http://localhost:8585/callback
          name: valisgo-cli
          public: true

      enablePasswordDB: true

      staticPasswords:
        - email: "admin@valisgo.local"
          # This is the bcrypt hash for the word: "password"
          hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTTsOW3.1sVyiPi2vT8wXF.q.Hym"
          username: "admin"
          userID: "admin@valisgo.local"
