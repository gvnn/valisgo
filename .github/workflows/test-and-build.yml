name: Go
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Install dependencies
        run: make install
      - name: Build
        run: make build
      - name: Test with the Go CLI
        run: make test
